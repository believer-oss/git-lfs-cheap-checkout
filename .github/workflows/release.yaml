name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*

jobs:
  upload-assets:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-gnu
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: believer-oss/setup-rust-toolchain@ff4c7a2d9523e22eab355f13c7732a4ea3e7a9b1
        with:
          target: ${{ matrix.target }}

      # x86_64-pc-windows-gnu needs the mingw-w64 linker, which lives here on
      # GitHub's windows runners but isn't on PATH by default.
      - name: Add mingw to PATH (windows-gnu)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: bash
        run: echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf "$GITHUB_WORKSPACE/git-lfs-cheap-checkout-${{ matrix.target }}.tar.gz" git-lfs-cheap-checkout

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path "target\${{ matrix.target }}\release\git-lfs-cheap-checkout.exe" -DestinationPath "git-lfs-cheap-checkout-${{ matrix.target }}.zip"

      - name: Release
        uses: believer-oss/action-gh-release@ab50eebb6488051c6788d97fa95232267c6a4e23
        with:
          files: |
            git-lfs-cheap-checkout-${{ matrix.target }}.tar.gz
            git-lfs-cheap-checkout-${{ matrix.target }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}
